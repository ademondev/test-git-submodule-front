name: Sync docs to docs repository

on:
  push:
    branches: [develop, staging, main]
    paths: ['docs/**']

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    # Skip if this push was made by the propagation action to avoid infinite loops
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.DOCS_SYNC_TOKEN }}

      - name: Configure git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: Push docs changes to docs repository
        run: |
          git clone https://x-access-token:${{ secrets.DOCS_SYNC_TOKEN }}@github.com/ademondev/test-git-submodule-docs.git docs-repo
          
          # Copy docs to the docs repo
          cp docs/*.md docs-repo/
          
          cd docs-repo
          
          if ! git diff --quiet; then
            git add .
            git commit -m "docs: sync from frontend (${GITHUB_SHA:0:8}) [skip ci]"
            git push origin main
            echo "✅ Docs synced to docs repository"
          else
            echo "ℹ️ No docs changes to sync"
          fi